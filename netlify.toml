[build]
  base = "apps/web"
  command = "npm run build"
  publish = "dist/web/browser"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Service worker files: never cache so the browser always sees updates
# the moment we ship a new build.
[[headers]]
  for = "/ngsw-worker.js"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"
    Service-Worker-Allowed = "/"

[[headers]]
  for = "/ngsw.json"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"

[[headers]]
  for = "/safety-worker.js"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"

# Manifest: short cache so updates to name/icons/theme color roll out
# within an hour.
[[headers]]
  for = "/manifest.webmanifest"
  [headers.values]
    Content-Type = "application/manifest+json"
    Cache-Control = "public, max-age=3600"

# Icons: cache for a week. Bump the path or filename to bust the cache.
[[headers]]
  for = "/icons/*"
  [headers.values]
    Cache-Control = "public, max-age=604800, immutable"

# Hashed JS/CSS bundles: cache forever (the filename hash invalidates).
[[headers]]
  for = "/*.js"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.css"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Map tiles + app shell: rely on Angular SW for caching.
[[headers]]
  for = "/index.html"
  [headers.values]
    Cache-Control = "no-cache"
